name: Release binaries

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to build, for example v2.1.89"
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
  cancel-in-progress: true

jobs:
  validate-tag:
    name: Validate release tag
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.version.outputs.tag }}
      version: ${{ steps.version.outputs.version }}
      checkout_ref: ${{ steps.version.outputs.checkout_ref }}
    steps:
      - name: Checkout repository metadata
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve tag and version
        id: version
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_TAG: ${{ inputs.tag }}
        run: |
          if [[ "$EVENT_NAME" == "workflow_dispatch" ]]; then
            TAG="$INPUT_TAG"
          else
            TAG="${GITHUB_REF_NAME}"
          fi

          if [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Invalid release tag: $TAG" >&2
            echo "Expected format: vX.Y.Z" >&2
            exit 1
          fi

          if [[ "$EVENT_NAME" == "workflow_dispatch" ]]; then
            git fetch --force --tags origin
            if ! CHECKOUT_REF="$(git rev-parse "refs/tags/$TAG^{}" 2>/dev/null)"; then
              echo "Release tag does not exist: $TAG" >&2
              exit 1
            fi
          else
            CHECKOUT_REF="${GITHUB_SHA}"
          fi

          VERSION="${TAG#v}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "checkout_ref=$CHECKOUT_REF" >> "$GITHUB_OUTPUT"

  source-checks:
    name: Source checks
    needs: validate-tag
    runs-on: ubuntu-latest
    env:
      CLAUDE_CODE_VERSION: ${{ needs.validate-tag.outputs.version }}
    steps:
      - name: Checkout tag
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.validate-tag.outputs.checkout_ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Verify source version is dev
        shell: bash
        run: |
          node -e "const p=require('./package.json'); if (p.version !== '0.0.0-dev') { console.error('package.json version must stay 0.0.0-dev, got ' + p.version); process.exit(1); }"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Type check
        run: bunx tsc --noEmit --pretty false

      - name: Lint
        run: bun run lint

      - name: Audit missing recovered imports
        run: bun run audit:missing

      - name: Check whitespace
        run: git diff --check

  create-release:
    name: Create GitHub Release
    needs:
      - validate-tag
      - source-checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository metadata
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create or reset release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.validate-tag.outputs.tag }}
          CHECKOUT_REF: ${{ needs.validate-tag.outputs.checkout_ref }}
        run: |
          gh release view "$TAG" >/dev/null 2>&1 && gh release delete "$TAG" --yes --cleanup-tag=false || true
          gh release create "$TAG" \
            --target "$CHECKOUT_REF" \
            --title "$TAG" \
            --notes "Build in progress for $TAG."

  build:
    name: Build ${{ matrix.os }}
    needs:
      - validate-tag
      - source-checks
      - create-release
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-14
          - windows-latest
    env:
      CLAUDE_CODE_VERSION: ${{ needs.validate-tag.outputs.version }}
    steps:
      - name: Checkout tag
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.validate-tag.outputs.checkout_ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build CLI with release version
        run: bun run build

      - name: Verify CLI version
        shell: bash
        run: |
          VERSION_OUTPUT="$(bun run start --version)"
          echo "$VERSION_OUTPUT"
          if [[ "$VERSION_OUTPUT" != *"${CLAUDE_CODE_VERSION} (Claude Code)"* ]]; then
            echo "Expected version output to contain ${CLAUDE_CODE_VERSION} (Claude Code)" >&2
            exit 1
          fi

      - name: Verify CLI help
        run: bun run start --help

      - name: Package binary
        run: bun run package:binary

      - name: Verify packaged binary
        shell: bash
        run: |
          case "${{ runner.os }}" in
            Windows) EXT=".exe" ;;
            *) EXT="" ;;
          esac
          ARTIFACT="dist/release/claude-code-v${CLAUDE_CODE_VERSION}-$(bun -e 'console.log(process.platform)')-$(bun -e 'console.log(process.arch)')${EXT}"
          "$ARTIFACT" --version
          "$ARTIFACT" --help

      - name: Upload binary to release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.validate-tag.outputs.tag }}
        shell: bash
        run: gh release upload "$TAG" dist/release/* --clobber

  release:
    name: Publish GitHub Release and npm package
    needs:
      - validate-tag
      - source-checks
      - build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout tag metadata
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.validate-tag.outputs.checkout_ref }}

      - name: Resolve release commit
        id: release-commit
        shell: bash
        run: |
          echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Verify release tag still matches build commit
        shell: bash
        env:
          BUILD_SHA: ${{ needs.validate-tag.outputs.checkout_ref }}
          TAG: ${{ needs.validate-tag.outputs.tag }}
        run: |
          if ! git fetch --force origin "refs/tags/$TAG:refs/tags/$TAG"; then
            echo "Release tag no longer exists on origin: $TAG" >&2
            exit 1
          fi
          CURRENT_TAG_SHA="$(git rev-parse "refs/tags/$TAG^{}")"
          if [[ "$CURRENT_TAG_SHA" != "$BUILD_SHA" ]]; then
            echo "Release tag $TAG changed after build." >&2
            echo "Built commit: $BUILD_SHA" >&2
            echo "Current tag target: $CURRENT_TAG_SHA" >&2
            exit 1
          fi

      - name: Download release binaries
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.validate-tag.outputs.tag }}
        run: |
          mkdir -p artifacts
          gh release download "$TAG" --dir artifacts --pattern 'claude-code-*'

      - name: Generate checksums
        shell: bash
        run: |
          cd artifacts
          sha256sum * > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Prepare binary-only npm package
        env:
          CLAUDE_CODE_VERSION: ${{ needs.validate-tag.outputs.version }}
        run: bun ./scripts/prepare-npm-package.mjs artifacts dist/npm

      - name: Verify npm package wrapper
        shell: bash
        run: |
          PLATFORM="$(bun -e 'console.log(process.platform)')"
          ARCH="$(bun -e 'console.log(process.arch)')"
          mkdir -p dist/npm/main/node_modules/@esonhugh
          ln -s "../../../${PLATFORM}-${ARCH}" "dist/npm/main/node_modules/@esonhugh/claude-code-${PLATFORM}-${ARCH}"
          node ./dist/npm/main/bin/claude.js --version
          node ./dist/npm/main/bin/claude.js --help

      - name: Publish npm packages
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          npm config set registry https://registry.npmjs.org/
          npm config set //registry.npmjs.org/:_authToken "$NODE_AUTH_TOKEN"
          npm whoami

          publish_if_missing() {
            package_dir="$1"
            package_name="$(node -e "const fs = require('fs'); const p = JSON.parse(fs.readFileSync(process.argv[1], 'utf8')); console.log(p.name)" "$package_dir/package.json")"
            package_version="$(node -e "const fs = require('fs'); const p = JSON.parse(fs.readFileSync(process.argv[1], 'utf8')); console.log(p.version)" "$package_dir/package.json")"

            if npm view "$package_name@$package_version" version >/dev/null 2>&1; then
              echo "Skipping already published package: $package_name@$package_version"
              return
            fi

            (cd "$package_dir" && npm publish --access public)
          }

          for package_dir in dist/npm/*-*; do
            publish_if_missing "$package_dir"
          done
          publish_if_missing ./dist/npm/main

      - name: Write release notes
        shell: bash
        run: |
          cat > release-notes.md <<EOF
          Automated binary release for ${{ needs.validate-tag.outputs.tag }}.

          Version: ${{ needs.validate-tag.outputs.version }}
          Commit: ${{ steps.release-commit.outputs.sha }}

          Checks run before packaging:
          - bunx tsc --noEmit --pretty false
          - bun run lint
          - bun run audit:missing
          - git diff --check
          - bun run start --version
          - bun run start --help
          - packaged binary --version
          - packaged binary --help
          - npm launcher package --version
          - npm launcher package --help

          Verify downloads with SHA256SUMS.txt.
          EOF

      - name: Publish release notes and checksums
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.validate-tag.outputs.tag }}
        run: |
          gh release upload "$TAG" artifacts/SHA256SUMS.txt --clobber
          gh release edit "$TAG" --title "$TAG" --notes-file release-notes.md
